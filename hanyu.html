<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f5;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-text-tertiary: #999999;
  --color-border-secondary: #e0e0e0;
  --color-border-tertiary: #eeeeee;
  --border-radius-md: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 3rem; max-width: 1400px; margin: 0 auto; }

/* App Header */
.app-header { display: flex; align-items: center; gap: 16px; padding: 0.75rem 3rem; border-bottom: 1px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.app-title { font-size: 18px; font-weight: 600; color: var(--color-text-primary); letter-spacing: 0.02em; }
.app-nav { display: flex; gap: 0; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; }
.app-nav-btn { padding: 6px 18px; font-size: 14px; text-decoration: none; color: var(--color-text-secondary); background: var(--color-background-primary); transition: all 0.2s; }
.app-nav-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 600; }
.app-nav-btn:hover:not(.active) { background: var(--color-background-secondary); }

/* Mode Toggle */
.mode-toggle { display: flex; gap: 0; margin-bottom: 1rem; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; width: fit-content; }
.mode-btn { padding: 8px 20px; font-size: 14px; border: none; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-secondary); transition: all 0.2s; font-family: inherit; }
.mode-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 600; }
.mode-btn:hover:not(.active) { background: var(--color-background-secondary); }

/* Browse View */
.controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
.controls input { flex: 1; min-width: 160px; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); }
.controls select { padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); }
.stats { display: flex; gap: 12px; margin-bottom: 1rem; flex-wrap: wrap; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 14px; font-size: 13px; color: var(--color-text-secondary); }
.stat span { font-weight: 500; color: var(--color-text-primary); font-size: 15px; margin-right: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { text-align: left; font-weight: 500; font-size: 12px; color: var(--color-text-secondary); padding: 6px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); text-transform: uppercase; letter-spacing: 0.04em; }
tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary); }
tbody tr:hover { background: var(--color-background-secondary); }
tbody td { padding: 8px 10px; vertical-align: middle; }
.char { font-size: 22px; font-weight: 500; }
.pinyin { color: var(--color-text-secondary); font-style: italic; }
.badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 500; }
.n    { background: #E6F1FB; color: #0C447C; }
.v    { background: #EAF3DE; color: #27500A; }
.pron { background: #EEEDFE; color: #3C3489; }
.adv  { background: #FAEEDA; color: #633806; }
.adj  { background: #FBEAF0; color: #72243E; }
.part { background: #FAECE7; color: #712B13; }
.other{ background: #F1EFE8; color: #444441; }
.lesson-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.weight-badge { font-size: 10px; padding: 2px 5px; border-radius: 99px; font-weight: 500; margin: 1px; display: inline-block; }
.weight-4 { background: #FBEAF0; color: #72243E; }
.weight-3 { background: #FAEEDA; color: #633806; }
.weight-2 { background: #EAF3DE; color: #27500A; }
.weight-1 { background: #E6F1FB; color: #0C447C; }
.weight-new { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.rating-col { display: none; }
.rating-col.show { display: table-cell; }
th.rating-col.show { display: table-cell; }
.viet { color: var(--color-text-secondary); font-size: 13px; }
.audio-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 4px; opacity: 0.5; transition: opacity 0.15s; vertical-align: middle; }
.audio-btn:hover { opacity: 1; }

/* Hide & Seek */
.hs-controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
.hs-input { width: 100%; padding: 4px 6px; border: 1.5px solid var(--color-border-secondary); border-radius: 4px; font-size: 13px; font-family: inherit; text-align: center; background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
.hs-input:focus { border-color: #0C447C; }
.hs-input.correct { border-color: #27500A; background: #EAF3DE; }
.hs-input.incorrect { border-color: #72243E; background: #FBEAF0; }
.hs-check-btn { padding: 2px 8px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit; background: var(--color-background-secondary); color: var(--color-text-secondary); }
.hs-check-btn:hover { background: #E6F1FB; color: #0C447C; }
.hs-result { font-size: 12px; margin-top: 2px; }
.hs-result.correct { color: #27500A; }
.hs-result.incorrect { color: #72243E; }

/* Flashcard View */
#flashcard-view { display: none; }
#writing-view { display: none; }
#pinyin-view { display: none; }
#choose-view { display: none; }
#listen-view { display: none; }
#match-view { display: none; }

/* Choose Mode */
.ch-options { display: flex; flex-direction: column; gap: 10px; width: 85%; margin-top: 16px; }
.ch-option { width: 100%; padding: 12px 16px; border-radius: var(--border-radius-md); border: 1.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 15px; font-family: inherit; cursor: pointer; transition: all 0.15s; text-align: left; }
.ch-option:hover:not(:disabled):not(.correct):not(.wrong) { background: var(--color-background-secondary); border-color: #0C447C; }
.ch-option.correct { background: #EAF3DE; border-color: #27500A; color: #27500A; font-weight: 600; }
.ch-option.wrong { background: #FBEAF0; border-color: #72243E; color: #72243E; font-weight: 600; }
.ch-option:disabled { cursor: default; }
.ch-card-char { font-size: 56px; font-weight: 600; text-align: center; padding: 20px 16px; }
.ch-next-btn { margin-top: 14px; padding: 10px 28px; border: none; border-radius: var(--border-radius-md); background: #0C447C; color: #fff; font-size: 14px; font-family: inherit; cursor: pointer; transition: background 0.15s; }
.ch-next-btn:hover { background: #093562; }

/* Listen Mode — reuses .ch-options for the options list */
.ln-audio-btn { background: #E6F1FB; border: 2px solid #0C447C; color: #0C447C; border-radius: 50%; width: 96px; height: 96px; font-size: 44px; cursor: pointer; margin: 20px auto; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, background 0.15s; padding: 0; }
.ln-audio-btn:hover { background: #D0E3F5; }
.ln-audio-btn:active { transform: scale(0.96); }
.ln-reveal { margin-top: 14px; text-align: center; padding: 10px 14px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); display: none; }
.ln-reveal.visible { display: block; }
.ln-reveal .char { font-size: 28px; font-weight: 600; }
.ln-reveal .pinyin { color: var(--color-text-secondary); font-style: italic; margin-left: 8px; font-size: 16px; }

/* Match Mode */
.mt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 560px; margin: 16px auto; }
.mt-tile { aspect-ratio: 3/2; min-height: 80px; border: 1.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); display: flex; align-items: center; justify-content: center; padding: 8px; text-align: center; cursor: pointer; transition: all 0.15s; user-select: none; }
.mt-tile:hover:not(.matched):not(.face-up) { background: var(--color-background-secondary); }
.mt-tile.face-down { color: var(--color-text-tertiary); font-size: 32px; font-weight: 300; }
.mt-tile.face-up { border-color: #0C447C; background: #E6F1FB; }
.mt-tile.matched { border-color: #27500A; background: #EAF3DE; color: #27500A; cursor: default; }
.mt-tile .mt-char { font-size: 24px; font-weight: 600; }
.mt-tile .mt-viet { font-size: 13px; line-height: 1.3; }
.fc-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
.fc-controls select { padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); }
.fc-stats { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.fc-stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 14px; font-size: 13px; color: var(--color-text-secondary); }
.fc-stat span { font-weight: 600; margin-right: 4px; }
.fc-stat.due span { color: #C2410C; }
.fc-stat.new-cards span { color: #0C447C; }
.fc-stat.learned span { color: #27500A; }
.fc-reset-btn { padding: 8px 14px; font-size: 13px; font-family: inherit; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: background 0.15s; }
.fc-reset-btn:hover { background: #FBEAF0; color: #72243E; border-color: #FBEAF0; }

/* Card */
.card-area { display: flex; flex-direction: column; align-items: center; margin: 0 auto; max-width: 400px; }
.card-container { perspective: 1000px; width: 100%; aspect-ratio: 3/2; margin-bottom: 1rem; cursor: pointer; }
.card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s ease; transform-style: preserve-3d; }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; border: 1px solid var(--color-border-secondary); background: var(--color-background-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-front .card-char { font-size: 48px; font-weight: 600; margin-bottom: 12px; }
.card-front .card-hint { font-size: 13px; color: var(--color-text-tertiary); }
.answer-group { width: 85%; display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.answer-row { display: flex; align-items: center; gap: 8px; }
.answer-row label { font-size: 12px; color: var(--color-text-tertiary); min-width: 55px; text-align: right; }
.answer-row input { flex: 1; padding: 7px 10px; border: 1.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; font-family: inherit; text-align: center; background: var(--color-background-primary); color: var(--color-text-primary); outline: none; transition: border-color 0.2s; }
.answer-row input:focus { border-color: #0C447C; }
.answer-row input::placeholder { color: var(--color-text-tertiary); }
.feedback-row { font-size: 12px; margin-top: 2px; }
.feedback-row .correct { color: #27500A; }
.feedback-row .incorrect { color: #72243E; }
.answer-input { width: 80%; padding: 8px 12px; border: 1.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; font-family: inherit; text-align: center; margin-top: 8px; background: var(--color-background-primary); color: var(--color-text-primary); outline: none; transition: border-color 0.2s; }
.answer-input:focus { border-color: #0C447C; }
.answer-input::placeholder { color: var(--color-text-tertiary); }
.check-btn { margin-top: 10px; padding: 7px 24px; border: none; border-radius: var(--border-radius-md); background: #0C447C; color: #fff; font-size: 14px; font-family: inherit; cursor: pointer; transition: background 0.15s; }
.check-btn:hover { background: #093562; }
.card-back { transform: rotateY(180deg); gap: 8px; }
.card-back .card-char { font-size: 36px; font-weight: 600; }
.card-back .card-pinyin { font-size: 20px; color: var(--color-text-secondary); font-style: italic; }
.card-back .card-meaning { font-size: 16px; color: var(--color-text-primary); text-align: center; margin-top: 4px; }
.card-back .card-pos { margin-top: 4px; }
.answer-result { margin-top: 6px; font-size: 14px; font-weight: 600; padding: 4px 12px; border-radius: 6px; }
.answer-result.correct { background: #EAF3DE; color: #27500A; }
.answer-result.incorrect { background: #FBEAF0; color: #72243E; }
.your-answer { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }

/* Rating Buttons */
.rating-hint { font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin-bottom: 6px; opacity: 0; transition: opacity 0.3s; }
.rating-hint.visible { opacity: 1; }
.rating-btns { display: flex; gap: 8px; width: 100%; margin-top: 0; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.rating-btns.visible { opacity: 1; pointer-events: auto; }
.rate-btn { flex: 1; padding: 10px 4px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: transform 0.1s, filter 0.1s; }
.rate-desc { display: block; font-size: 10px; font-weight: 400; opacity: 0.6; margin-top: 1px; }
.rate-btn:active { transform: scale(0.96); }
.rate-btn:hover { filter: brightness(0.95); }
.rate-btn.again { background: #FBEAF0; color: #72243E; }
.rate-btn.hard  { background: #FAEEDA; color: #633806; }
.rate-btn.good  { background: #EAF3DE; color: #27500A; }
.rate-btn.easy  { background: #E6F1FB; color: #0C447C; }
.rate-label { display: block; font-size: 11px; font-weight: 400; opacity: 0.7; margin-top: 2px; }

/* Progress */
.fc-progress { font-size: 12px; color: var(--color-text-tertiary); margin-top: 12px; text-align: center; }
.fc-keyboard-hint { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; text-align: center; opacity: 0.6; }

/* Session Complete / Empty */
.fc-message { text-align: center; padding: 48px 24px; }
.fc-message h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--color-text-primary); }
.fc-message p { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 6px; }
.fc-message .fc-msg-actions { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
.fc-message button { padding: 8px 20px; border-radius: var(--border-radius-md); font-size: 14px; font-family: inherit; cursor: pointer; border: 1px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); transition: background 0.15s; }
.fc-message button:hover { background: var(--color-background-secondary); }
.fc-message button.primary { background: #27500A; color: #fff; border-color: #27500A; }
.fc-message button.primary:hover { background: #1e3d08; }

/* Card enter animation */
@keyframes cardSlideIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
.card-container.entering { animation: cardSlideIn 0.3s ease; }

/* ── Mobile: convert table to card list ── */
.mobile-cards { display: none; }

@media (max-width: 600px) {
  .wrap { padding: 0.75rem 0.5rem; }

  /* App header */
  .app-header { padding: 0.75rem; }
  .app-title { font-size: 16px; }
  .app-nav-btn { padding: 6px 14px; font-size: 13px; }

  /* Mode toggle full width */
  .mode-toggle { width: 100%; }
  .mode-btn { flex: 1; padding: 12px 8px; font-size: 13px; text-align: center; }

  /* Controls stack */
  .controls { flex-direction: column; gap: 6px; }
  .controls input { min-width: 100%; font-size: 16px; padding: 10px 12px; }
  .controls select { width: 100%; font-size: 16px; padding: 10px 12px; }
  .fc-controls { flex-direction: column; gap: 6px; }
  .fc-controls select { width: 100%; font-size: 16px; padding: 10px 12px; }

  /* Stats */
  .stats { gap: 6px; }
  .stat { padding: 8px 12px; font-size: 14px; }
  .stat span { font-size: 15px; }
  .fc-stats { gap: 6px; flex-wrap: wrap; align-items: center; }
  .fc-stat { padding: 6px 10px; font-size: 12px; }
  .fc-stat span { font-size: 13px; }

  /* Hide table, show card list */
  table { display: none; }
  .mobile-cards { display: flex; flex-direction: column; gap: 8px; }
  .mobile-card { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; border: 1px solid var(--color-border-tertiary); background: var(--color-background-primary); }
  .mobile-card-left { flex-shrink: 0; text-align: center; min-width: 60px; }
  .mobile-card-left .char { font-size: 28px; font-weight: 600; display: block; }
  .mobile-card-left .pinyin { font-size: 13px; color: var(--color-text-secondary); font-style: italic; display: block; margin-top: 2px; }
  .mobile-card-right { flex: 1; min-width: 0; }
  .mobile-card-right .viet { font-size: 15px; color: var(--color-text-primary); display: block; }
  .mobile-card-meta { display: flex; gap: 6px; align-items: center; margin-top: 4px; }

  /* Card area — no flip on mobile, stack front/back */
  .card-area { max-width: 100%; }
  .card-container { perspective: none; aspect-ratio: auto; height: auto; cursor: default; }
  .card-inner { transform-style: flat; transition: none; }
  .card-inner.flipped { transform: none; }
  .card-face { position: relative; width: 100%; height: auto; backface-visibility: visible; -webkit-backface-visibility: visible; padding: 20px; border-radius: 12px; border: 1px solid var(--color-border-secondary); background: var(--color-background-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .card-back { transform: none; display: none; margin-top: 8px; }
  .card-inner.flipped .card-front { display: none; }
  .card-inner.flipped .card-back { display: flex; }
  .card-front .card-char { font-size: 36px; margin-bottom: 8px; }
  .card-back .card-char { font-size: 28px; }
  .card-back .card-pinyin { font-size: 18px; }
  .card-back .card-meaning { font-size: 16px; }
  .answer-input { width: 90%; font-size: 16px; padding: 10px 12px; }
  .answer-group { width: 100%; }
  .answer-row label { min-width: 50px; font-size: 12px; }
  .answer-row input { font-size: 16px; padding: 10px 8px; }
  .check-btn { padding: 12px 32px; font-size: 16px; margin-top: 12px; }

  /* Choose mode */
  .ch-options { width: 100%; }
  .ch-option { font-size: 16px; padding: 14px 12px; }
  .ch-card-char { font-size: 48px; padding: 16px 8px; }

  /* Listen mode */
  .ln-audio-btn { width: 84px; height: 84px; font-size: 36px; }

  /* Match mode */
  .mt-grid { gap: 6px; max-width: 100%; }
  .mt-tile { min-height: 60px; padding: 4px; }
  .mt-tile.face-down { font-size: 24px; }
  .mt-tile .mt-char { font-size: 18px; }
  .mt-tile .mt-viet { font-size: 11px; }

  /* Rating buttons stack 2x2 */
  .rating-btns { flex-wrap: wrap; gap: 6px; }
  .rate-btn { flex: 1 1 45%; padding: 14px 4px; font-size: 14px; }
  .rate-desc { font-size: 11px; }
  .rate-label { font-size: 11px; }

  /* Messages */
  .fc-message { padding: 32px 16px; }
  .fc-message .fc-msg-actions { flex-direction: column; }
  .fc-message button { width: 100%; padding: 12px 20px; font-size: 16px; }

  /* Keyboard hints hidden on mobile */
  .fc-keyboard-hint { display: none; }

  /* Hide & Seek mobile */
  .hs-input { font-size: 16px; padding: 8px 6px; }
  .mobile-card-left .hs-input { width: 80px; }
  .mobile-card-right .hs-input { width: 100%; margin-bottom: 4px; }
  .hs-check-btn { padding: 6px 14px; font-size: 13px; }
  .hs-controls { flex-direction: column; }

  /* Stats buttons wrap on mobile */
  .stats { flex-wrap: wrap; align-items: center; }
  .fc-reset-btn { font-size: 12px; padding: 6px 10px; }
}
</style>

<div class="app-header">
  <span class="app-title">汉语学习</span>
  <nav class="app-nav">
    <a class="app-nav-btn" href="lesson.html">Lessons</a>
    <a class="app-nav-btn active" href="hanyu.html">Vocabulary</a>
    <a class="app-nav-btn" href="grammar.html">Grammar</a>
  </nav>
</div>
<div class="wrap">
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="switchMode('browse')">Browse</button>
    <button class="mode-btn" onclick="switchMode('flashcard')">Character</button>
    <button class="mode-btn" onclick="switchMode('writing')">Meaning</button>
    <button class="mode-btn" onclick="switchMode('pinyin')">Pinyin</button>
    <button class="mode-btn" onclick="switchMode('choose')">Choose</button>
    <button class="mode-btn" onclick="switchMode('listen')">Listen</button>
    <button class="mode-btn" onclick="switchMode('match')">Match</button>
  </div>

  <!-- Browse View -->
  <div id="browse-view">
    <div class="controls">
      <input type="text" id="search" placeholder="Search characters, pinyin, or meaning..." oninput="render()">
      <select id="posFilter" onchange="render()">
        <option value="">All types</option>
        <option value="n.">Noun (n.)</option>
        <option value="v.">Verb (v.)</option>
        <option value="pron.">Pronoun (pron.)</option>
        <option value="adv.">Adverb (adv.)</option>
        <option value="adj.">Adjective (adj.)</option>
        <option value="part.">Particle (part.)</option>
        <option value="suff.">Suffix (suff.)</option>
        <option value="mw.">Measure word (mw.)</option>

<script>

/* ── Browse Table ── */
function posClass(pos) {
  if(!pos) return 'other';
  if(pos.startsWith('n')) return 'n';
  if(pos.startsWith('v')) return 'v';
  if(pos.startsWith('pron')) return 'pron';
  if(pos.startsWith('adv')) return 'adv';
  if(pos.startsWith('adj')) return 'adj';
  if(pos.startsWith('part')) return 'part';
  return 'other';
}

let showRatings = false;

function weightBadge(wt, prefix) {
  if (wt === undefined) return `<span class="weight-badge weight-new">${prefix}:New</span>`;
  const labels = { 4: 'Forgot', 3: 'Hard', 2: 'Good', 1: 'Easy' };
  return `<span class="weight-badge weight-${wt}">${prefix}:${labels[wt] || 'Good'}</span>`;
}

function weightLabel(w) {
  const cw = loadWeights('char');
  const mw = loadWeights('meaning');
  const pw = loadWeights('pinyin');
  const k = String(w.n);
  return `${weightBadge(cw[k], 'C')} ${weightBadge(mw[k], 'M')} ${weightBadge(pw[k], 'P')}`;
}

function toggleRatings() {
  showRatings = !showRatings;
  document.getElementById('toggleRatingsBtn').textContent = showRatings ? 'Hide Ratings' : 'Show Ratings';
  document.getElementById('clearRatingsBtn').style.display = showRatings ? '' : 'none';
  document.querySelectorAll('.rating-col').forEach(el => el.classList.toggle('show', showRatings));
  render();
}

function speakZh(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.85;
  u.pitch = 1;
  // Try to find a good Chinese voice
  const voices = speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang === 'zh-CN' && v.name.includes('Google')) ||
                  voices.find(v => v.lang === 'zh-CN' && v.name.includes('Ting')) ||
                  voices.find(v => v.lang.startsWith('zh-CN')) ||
                  voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) u.voice = zhVoice;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
// Preload voices
speechSynthesis.getVoices();

function audioBtn(char) {
  return `<button class="audio-btn" onclick="event.stopPropagation();speakZh('${char.replace(/'/g, "\\'")}')" title="Listen">&#128264;</button>`;
}

let hsMode = false;
let hsHidden = {}; // per word n: { char, pinyin, viet } — which fields are hidden

const HS_MODES = [
  { char: true, pinyin: true, viet: false },   // hide char + pinyin
  { char: false, pinyin: true, viet: false },   // hide pinyin only
  { char: false, pinyin: false, viet: true },   // hide meaning only
  { char: false, pinyin: true, viet: true },    // hide pinyin + meaning
];

function hsConfigFor(mode) {
  if (mode === 'char') return { char: true, pinyin: false, viet: false };
  if (mode === 'pinyin') return { char: false, pinyin: true, viet: false };
  if (mode === 'viet') return { char: false, pinyin: false, viet: true };
  return null; // random
}

function startHideSeek() {
  hsMode = true;
  hsHidden = {};
  const fieldMode = document.getElementById('hsModeSelect').value;
  const fixed = hsConfigFor(fieldMode);
  const q = document.getElementById('search').value.toLowerCase();
  const pos = document.getElementById('posFilter').value;
  const les = document.getElementById('lessonFilter').value;
  const filtered = words.filter(w => {
    const matchQ = !q || w.char.includes(q) || w.pinyin.toLowerCase().includes(q) || w.viet.toLowerCase().includes(q);
    const matchPos = !pos || w.pos === pos || w.pos.startsWith(pos);
    const matchLes = !les || w.lesson == les;
    return matchQ && matchPos && matchLes;
  });
  filtered.forEach(w => {
    hsHidden[w.n] = fixed || HS_MODES[Math.floor(Math.random() * HS_MODES.length)];
  });
  document.getElementById('hsBtn').style.display = 'none';
  document.getElementById('hsCheckAllBtn').style.display = '';
  document.getElementById('hsStopBtn').style.display = '';
  document.getElementById('hsModeSelect').style.display = '';
  const score = document.getElementById('hsScore');
  score.style.display = 'none';
  score.textContent = '';
  render();
}

function stopHideSeek() {
  hsMode = false;
  hsHidden = {};
  document.getElementById('hsBtn').style.display = '';
  document.getElementById('hsCheckAllBtn').style.display = 'none';
  document.getElementById('hsStopBtn').style.display = 'none';
  document.getElementById('hsModeSelect').style.display = 'none';
  const score = document.getElementById('hsScore');
  score.style.display = 'none';
  score.textContent = '';
  render();
}

function checkRowHs(n) {
  const w = words.find(x => x.n === n);
  if (!w) return;
  const h = hsHidden[n];
  if (!h) return;
  if (h.char) {
    const inp = document.getElementById('hs-char-' + n);
    if (inp) {
      const ok = inp.value.trim() === w.char;
      inp.classList.remove('correct', 'incorrect');
      inp.classList.add(ok ? 'correct' : 'incorrect');
    }
  }
  if (h.pinyin) {
    const inp = document.getElementById('hs-pinyin-' + n);
    if (inp) {
      const ok = checkPinyinMatch(inp.value.trim(), w);
      inp.classList.remove('correct', 'incorrect');
      inp.classList.add(ok ? 'correct' : 'incorrect');
    }
  }
  if (h.viet) {
    const inp = document.getElementById('hs-viet-' + n);
    if (inp) {
      const ok = checkViet(inp.value.trim(), w);
      inp.classList.remove('correct', 'incorrect');
      inp.classList.add(ok ? 'correct' : 'incorrect');
    }
  }
}

function checkAllHs() {
  let correct = 0, total = 0;
  Object.keys(hsHidden).forEach(nStr => {
    const n = parseInt(nStr);
    checkRowHs(n);
    checkRowHsMobile(n);
    const w = words.find(x => x.n === n);
    if (!w) return;
    const h = hsHidden[n];
    if (!h) return;
    ['char', 'pinyin', 'viet'].forEach(field => {
      if (!h[field]) return;
      total++;
      const deskInp = document.getElementById('hs-' + field + '-' + n);
      const mobInp = document.getElementById('hs-m-' + field + '-' + n);
      // Prefer whichever input is currently visible in the layout
      const inp = (deskInp && deskInp.offsetParent !== null) ? deskInp : (mobInp && mobInp.offsetParent !== null ? mobInp : (deskInp || mobInp));
      if (!inp) return;
      const val = inp.value.trim();
      let ok = false;
      if (field === 'char') ok = val === w.char;
      else if (field === 'pinyin') ok = checkPinyinMatch(val, w);
      else if (field === 'viet') ok = checkViet(val, w);
      if (ok) correct++;
    });
  });
  const score = document.getElementById('hsScore');
  score.innerHTML = `<span>${correct}</span> / ${total} correct`;
  score.style.display = '';
}

function hsCell(w, field, value) {
  const h = hsHidden[w.n];
  if (!hsMode || !h || !h[field]) return null;
  const labels = { char: 'Character', pinyin: 'Pinyin', viet: 'Meaning' };
  return `<input type="text" class="hs-input" id="hs-${field}-${w.n}" placeholder="${labels[field]}" autocomplete="off">`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const pos = document.getElementById('posFilter').value;
  const les = document.getElementById('lessonFilter').value;
  const filtered = words.filter(w => {
    const matchQ = !q || w.char.includes(q) || w.pinyin.toLowerCase().includes(q) || w.viet.toLowerCase().includes(q);
    const matchPos = !pos || w.pos === pos || w.pos.startsWith(pos);
    const matchLes = !les || w.lesson == les;
    return matchQ && matchPos && matchLes;
  });
  document.getElementById('filteredCount').textContent = filtered.length;
  document.getElementById('totalCount').textContent = words.length;
  const rcls = showRatings ? 'rating-col show' : 'rating-col';
  const tb = document.getElementById('tbody');
  tb.innerHTML = filtered.map((w,i) => {
    const charCell = hsCell(w, 'char') || `<span class="char">${w.char}</span>${audioBtn(w.char)}`;
    const pinyinCell = hsCell(w, 'pinyin') || `<span class="pinyin">${w.pinyin}</span>`;
    const vietCell = hsCell(w, 'viet') || `<span class="viet">${w.viet}</span>`;
    const checkBtn = hsMode && hsHidden[w.n] ? `<button class="hs-check-btn" onclick="checkRowHs(${w.n})">Check</button>` : '';
    return `
    <tr>
      <td style="color:var(--color-text-tertiary);font-size:12px">${i+1}</td>
      <td>${charCell}</td>
      <td>${pinyinCell}</td>
      <td>${w.pos ? `<span class="badge ${posClass(w.pos)}">${w.pos}</span>` : '<span style="color:var(--color-text-tertiary);font-size:12px">—</span>'}</td>
      <td>${vietCell}</td>
      <td><span class="lesson-tag">L${w.lesson}</span>${checkBtn}</td>
      <td class="${rcls}">${weightLabel(w)}</td>
    </tr>`;
  }).join('');
  document.getElementById('mobileCards').innerHTML = filtered.map(w => {
    const h = hsMode && hsHidden[w.n];
    const charHtml = h && h.char ? `<input type="text" class="hs-input" id="hs-m-char-${w.n}" placeholder="Character" autocomplete="off">` : `<span class="char">${w.char}</span>${audioBtn(w.char)}`;
    const pinyinHtml = h && h.pinyin ? `<input type="text" class="hs-input" id="hs-m-pinyin-${w.n}" placeholder="Pinyin" autocomplete="off" style="margin-top:4px">` : `<span class="pinyin">${w.pinyin}</span>`;
    const vietHtml = h && h.viet ? `<input type="text" class="hs-input" id="hs-m-viet-${w.n}" placeholder="Meaning" autocomplete="off">` : `<span class="viet">${w.viet}</span>`;
    const checkBtn = h ? `<button class="hs-check-btn" onclick="checkRowHsMobile(${w.n})" style="margin-top:6px">Check</button>` : '';
    return `
    <div class="mobile-card">
      <div class="mobile-card-left">
        ${charHtml}
        ${pinyinHtml}
      </div>
      <div class="mobile-card-right">
        ${vietHtml}
        <div class="mobile-card-meta">
          ${w.pos ? `<span class="badge ${posClass(w.pos)}">${w.pos}</span>` : ''}
          <span class="lesson-tag">L${w.lesson}</span>
          ${checkBtn}
          ${showRatings ? weightLabel(w) : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function checkRowHsMobile(n) {
  const w = words.find(x => x.n === n);
  if (!w) return;
  const h = hsHidden[n];
  if (!h) return;
  if (h.char) {
    const inp = document.getElementById('hs-m-char-' + n);
    if (inp) { inp.classList.remove('correct','incorrect'); inp.classList.add(inp.value.trim() === w.char ? 'correct' : 'incorrect'); }
  }
  if (h.pinyin) {
    const inp = document.getElementById('hs-m-pinyin-' + n);
    if (inp) { inp.classList.remove('correct','incorrect'); inp.classList.add(checkPinyinMatch(inp.value.trim(), w) ? 'correct' : 'incorrect'); }
  }
  if (h.viet) {
    const inp = document.getElementById('hs-m-viet-' + n);
    if (inp) { inp.classList.remove('correct','incorrect'); inp.classList.add(checkViet(inp.value.trim(), w) ? 'correct' : 'incorrect'); }
  }
}

/* ── Mode Toggle ── */
let currentMode = 'browse';

function switchMode(mode) {
  currentMode = mode;
  const modes = ['browse', 'flashcard', 'writing', 'pinyin', 'choose', 'listen', 'match'];
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', modes[i] === mode);
  });
  document.getElementById('browse-view').style.display = mode === 'browse' ? 'block' : 'none';
  document.getElementById('choose-view').style.display = mode === 'choose' ? 'block' : 'none';
  document.getElementById('listen-view').style.display = mode === 'listen' ? 'block' : 'none';
  document.getElementById('flashcard-view').style.display = mode === 'flashcard' ? 'block' : 'none';
  document.getElementById('writing-view').style.display = mode === 'writing' ? 'block' : 'none';
  document.getElementById('pinyin-view').style.display = mode === 'pinyin' ? 'block' : 'none';
  document.getElementById('match-view').style.display = mode === 'match' ? 'block' : 'none';
  if (mode === 'choose') startChooseSession();
  if (mode === 'listen') startListenSession();
  if (mode === 'flashcard') startFlashcardSession();
  if (mode === 'writing') startWritingSession();
  if (mode === 'pinyin') startPinyinSession();
  if (mode === 'match') startMatchSession();
}

/* ── Weight Data Layer ── */
const WEIGHT_KEYS = { char: 'weights_char', meaning: 'weights_meaning', pinyin: 'weights_pinyin', choose: 'weights_choose', audio: 'weights_audio' };

function loadWeights(tab) {
  const key = WEIGHT_KEYS[tab] || WEIGHT_KEYS.char;
  let w = {};
  try { w = JSON.parse(localStorage.getItem(key)) || {}; } catch(e) {}
  return w;
}

function saveWeight(tab, wordN, weight) {
  const key = WEIGHT_KEYS[tab] || WEIGHT_KEYS.char;
  let w = {};
  try { w = JSON.parse(localStorage.getItem(key)) || {}; } catch(e) {}
  w[String(wordN)] = weight;
  try { localStorage.setItem(key, JSON.stringify(w)); } catch(e) {}
}

function getWeight(tab, wordN) {
  const weights = loadWeights(tab);
  const v = weights[String(wordN)];
  return v !== undefined ? v : 2;
}

/* ── Flashcard Session ── */
let fcQueue = [];
let fcIndex = 0;
let fcFlipped = false;
let fcAnswerChecked = false;
let fcCorrect = new Set();
let fcWrong = new Set();

function updateCheckBtn(inputIds, btnId) {
  const hasValue = inputIds.some(id => {
    const el = document.getElementById(id);
    return el && el.value.trim().length > 0;
  });
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = !hasValue;
  btn.style.opacity = hasValue ? '1' : '0.4';
  btn.style.cursor = hasValue ? 'pointer' : 'default';
}

function weightedShuffle(arr, weights) {
  const pool = arr.map(w => ({ word: w, weight: weights[String(w.n)] !== undefined ? weights[String(w.n)] : 2 }));
  const result = [];
  while (pool.length > 0) {
    const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
    let rand = Math.random() * totalWeight;
    let picked = 0;
    for (let i = 0; i < pool.length; i++) {
      rand -= pool[i].weight;
      if (rand <= 0) { picked = i; break; }
    }
    result.push(pool[picked].word);
    pool.splice(picked, 1);
  }
  return result;
}

function clearRatings() {
  if (!confirm('Clear all ratings? This resets weights to default.')) return;
  Object.values(WEIGHT_KEYS).forEach(k => localStorage.removeItem(k));
  render();
}

function startFlashcardSession() {
  const lesson = document.getElementById('fcLessonFilter').value;
  const limit = parseInt(document.getElementById('fcCardCount').value) || 0;
  const weights = loadWeights('char');
  const filtered = words.filter(w => !lesson || w.lesson == lesson);
  fcQueue = weightedShuffle(filtered, weights);
  if (limit > 0) fcQueue = fcQueue.slice(0, limit);
  fcIndex = 0;
  fcFlipped = false;
  fcCorrect = new Set();
  fcWrong = new Set();
  updateFcStats();
  renderCard();
}

function updateFcStats() {
  document.getElementById('fcCorrect').textContent = fcCorrect.size;
  document.getElementById('fcWrong').textContent = fcWrong.size;
  const unique = new Set(fcQueue.slice(fcIndex).map(w => w.n));
  document.getElementById('fcRemaining').textContent = unique.size;
}

function renderCard() {
  const content = document.getElementById('fc-content');

  if (fcQueue.length === 0) {
    content.innerHTML = `
      <div class="fc-message">
        <h3>No words available</h3>

function normalizePinyin(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '').replace(/ü/g, 'v').trim();
}

function checkViet(userAnswer, word) {
  const parts = word.viet.split(',').map(s => s.replace(/\(.*?\)/g, '').trim()).filter(Boolean);
  const nu = normalizeViet(userAnswer);
  return userAnswer.length > 0 && parts.some(p => {
    const np = normalizeViet(p);
    return nu === np || np.includes(nu) || nu.includes(np);
  });
}

function checkPinyinMatch(userAnswer, word) {
  const parts = word.pinyin.split('/').map(s => s.trim());
  const nu = normalizePinyin(userAnswer);
  return userAnswer.length > 0 && parts.some(p => normalizePinyin(p) === nu);
}

function feedbackHtml(label, userAnswer, isCorrect) {
  if (!userAnswer) return `<span class="incorrect">${label}: skipped</span>`;
  return isCorrect ? `<span class="correct">${label}: ✓ ${userAnswer}</span>` : `<span class="incorrect">${label}: ✗ ${userAnswer}</span>`;
}

let chCorrect = new Set();
let chWrong = new Set();

function startChooseSession() {

function updateChStats() {
  document.getElementById('chCorrect').textContent = chCorrect.size;
  document.getElementById('chWrong').textContent = chWrong.size;
  const unique = new Set(chQueue.slice(chIndex).map(w => w.n));
  document.getElementById('chRemaining').textContent = unique.size;
}

function pickChooseDistractors(target) {
  // Prefer same-lesson, different-pos words; fallback to any other word.
  const sameLesson = words.filter(w => w.n !== target.n && w.lesson === target.lesson);
  const otherLesson = words.filter(w => w.n !== target.n && w.lesson !== target.lesson);
  const diffPos = sameLesson.filter(w => w.pos !== target.pos);
  const samePos = sameLesson.filter(w => w.pos === target.pos);
  const pool = [...diffPos, ...samePos, ...otherLesson];
  const picked = [];
  const seenViet = new Set([target.viet]);
  for (const w of pool) {
    if (picked.length >= 3) break;
    if (seenViet.has(w.viet)) continue;
    picked.push(w);
    seenViet.add(w.viet);
  }
  return picked;
}

function renderChooseCard() {
  const content = document.getElementById('ch-content');

  if (chQueue.length === 0) {
    content.innerHTML = `
      <div class="fc-message">
        <h3>No words available</h3>
        <p>Select a lesson to start practicing.</p>
      </div>`;
    return;

  if (chIndex >= chQueue.length) {

        </div>
      </div>`;
    return;
  }

  const w = chQueue[chIndex];
  chChecked = false;
  const distractors = pickChooseDistractors(w);
  // Build options = [correct, ...distractors], then shuffle
  const opts = [w, ...distractors];
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  chOptions = opts;
  chCorrectIdx = opts.findIndex(o => o.n === w.n);

  const posHtml = w.pos ? `<span class="badge ${posClass(w.pos)}">${w.pos}</span>` : '';

  content.innerHTML = `

      <div class="fc-keyboard-hint">1-4 to choose &middot; 1-4 after to rate</div>

    const c = document.querySelector('#ch-content .card-container');

function selectChoose(idx) {
  if (chChecked) return;
  chChecked = true;
  const w = chQueue[chIndex];
  const isCorrect = idx === chCorrectIdx;

  // Disable all options
  chOptions.forEach((_, i) => {
    const btn = document.getElementById('chOpt' + i);
    if (btn) btn.disabled = true;
  });
  // Highlight
  const chosen = document.getElementById('chOpt' + idx);
  const correctBtn = document.getElementById('chOpt' + chCorrectIdx);
  if (isCorrect) {
    chosen.classList.add('correct');
    chosen.innerHTML = '✓ ' + chosen.innerHTML;
    chCorrect.add(w.n);
    chWrong.delete(w.n);
  } else {
    chosen.classList.add('wrong');
    if (correctBtn) correctBtn.classList.add('correct');
    chWrong.add(w.n);
  }
  updateChStats();

  if (isCorrect) {
    // Auto-advance after 800ms with default weight=2 (Good)
    setTimeout(() => {
      if (chChecked) {
        saveWeight('choose', w.n, 2);
        chIndex++;
        renderChooseCard();
      }
    }, 800);
  } else {
    // Wait for rating or Next
    const ratingBtns = document.getElementById('chRatingBtns');
    const ratingHint = document.getElementById('chRatingHint');
    const nextWrap = document.getElementById('chNextWrap');
    if (ratingBtns) ratingBtns.classList.add('visible');
    if (ratingHint) ratingHint.classList.add('visible');
    if (nextWrap) nextWrap.style.display = 'block';
  }
}

function rateChooseCard(rating) {
  if (!chChecked) return;
  const w = chQueue[chIndex];
  saveWeight('choose', w.n, 4 - rating);

  if (rating === 0) {
    const insertAt = Math.min(chIndex + 5, chQueue.length);
    chQueue.splice(insertAt, 0, w);
  }

  chIndex++;
  updateChStats();
  renderChooseCard();
}

function nextChooseCard() {
  if (!chChecked) return;
  const w = chQueue[chIndex];
  // No explicit rating → save Forgot weight since user got it wrong
  saveWeight('choose', w.n, 4);
  const insertAt = Math.min(chIndex + 5, chQueue.length);
  chQueue.splice(insertAt, 0, w);
  chIndex++;
  updateChStats();
  renderChooseCard();
}

/* ── Listen Exercise ── */
let lnQueue = [];
let lnIndex = 0;
let lnCorrect = new Set();
let lnWrong = new Set();
let lnChecked = false;
let lnOptions = [];
let lnCorrectIdx = -1;
let lnRated = false;

function startListenSession() {
  const lesson = document.getElementById('lnLessonFilter').value;
  const limit = parseInt(document.getElementById('lnCardCount').value) || 0;
  const weights = loadWeights('audio');
  const filtered = weightedShuffle(words.filter(w => !lesson || w.lesson == lesson), weights);
  lnQueue = limit > 0 ? filtered.slice(0, limit) : filtered;
  lnIndex = 0;
  lnCorrect = new Set();
  lnWrong = new Set();
  lnChecked = false;
  lnRated = false;
  updateLnStats();
  renderListenCard();
}

function updateLnStats() {
  document.getElementById('lnCorrect').textContent = lnCorrect.size;
  document.getElementById('lnWrong').textContent = lnWrong.size;
  const unique = new Set(lnQueue.slice(lnIndex).map(w => w.n));
  document.getElementById('lnRemaining').textContent = unique.size;
}

function replayListenAudio() {
  const w = lnQueue[lnIndex];
  if (w) speakZh(w.char);
}

function renderListenCard() {
  const content = document.getElementById('ln-content');

  if (lnQueue.length === 0) {
    content.innerHTML = `
      <div class="fc-message">
        <h3>No words available</h3>
        <p>Select a lesson to start practicing.</p>
      </div>`;
    return;
  }

  if (lnIndex >= lnQueue.length) {
    const total = lnCorrect.size + lnWrong.size;
    const pct = total > 0 ? Math.round(lnCorrect.size / total * 100) : 0;
    content.innerHTML = `
      <div class="fc-message">
        <h3>Session Complete!</h3>
        <p>Score: <strong>${lnCorrect.size}/${total}</strong> (${pct}%)</p>
        <div class="fc-msg-actions">
          <button onclick="startListenSession()">Try Again</button>
          <button onclick="switchMode('browse')">Back to Browse</button>
        </div>
      </div>`;
    return;
  }

  const w = lnQueue[lnIndex];
  lnChecked = false;
  lnRated = false;
  const distractors = pickChooseDistractors(w);
  const opts = [w, ...distractors];
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  lnOptions = opts;
  lnCorrectIdx = opts.findIndex(o => o.n === w.n);

  content.innerHTML = `
    <div class="card-area">
      <div class="card-container entering">
        <div class="card-face card-front" style="position:relative;height:auto;min-height:0;padding:20px;">
          <button class="ln-audio-btn" onclick="replayListenAudio()" title="Replay (Space)">🔊</button>
          <div class="ch-options" id="lnOptionsList">
            ${opts.map((o, i) => `<button class="ch-option" id="lnOpt${i}" onclick="selectListen(${i})">${o.viet}</button>`).join('')}
          </div>
          <div class="ln-reveal" id="lnReveal"></div>
          <div id="lnNextWrap" style="text-align:center;display:none;margin-top:12px"><button class="ch-next-btn" onclick="nextListenCard()">Next →</button></div>
        </div>
      </div>
      <div class="rating-hint" id="lnRatingHint">Rate how well you knew it — harder words will appear more often</div>
      <div class="rating-btns" id="lnRatingBtns">
        <button class="rate-btn again" onclick="rateListenCard(0)">Forgot<span class="rate-desc">Don't remember</span></button>
        <button class="rate-btn hard" onclick="rateListenCard(1)">Hard<span class="rate-desc">Barely recalled</span></button>
        <button class="rate-btn good" onclick="rateListenCard(2)">Good<span class="rate-desc">Remembered</span></button>
        <button class="rate-btn easy" onclick="rateListenCard(3)">Easy<span class="rate-desc">Knew instantly</span></button>
      </div>
      <div class="fc-progress">Card ${lnCorrect.size + lnWrong.size + 1} of ${new Set(lnQueue.map(w => w.n)).size}</div>
      <div class="fc-keyboard-hint">Space replays &middot; 1-4 to choose &middot; 1-4 after to rate</div>
    </div>`;

  setTimeout(() => {
    const c = document.querySelector('#ln-content .card-container');
    if (c) c.classList.remove('entering');
    speakZh(w.char);
  }, 300);
}

function selectListen(idx) {
  if (lnChecked) return;
  lnChecked = true;
  const w = lnQueue[lnIndex];
  const isCorrect = idx === lnCorrectIdx;

  lnOptions.forEach((_, i) => {
    const btn = document.getElementById('lnOpt' + i);
    if (btn) btn.disabled = true;
  });
  const chosen = document.getElementById('lnOpt' + idx);
  const correctBtn = document.getElementById('lnOpt' + lnCorrectIdx);
  if (isCorrect) {
    chosen.classList.add('correct');
    chosen.innerHTML = '✓ ' + chosen.innerHTML;
    lnCorrect.add(w.n);
    lnWrong.delete(w.n);
  } else {
    chosen.classList.add('wrong');
    if (correctBtn) correctBtn.classList.add('correct');
    lnWrong.add(w.n);
    const reveal = document.getElementById('lnReveal');
    if (reveal) {
      reveal.innerHTML = `<span class="char">${w.char}</span><span class="pinyin">${w.pinyin}</span>`;
      reveal.classList.add('visible');
    }
  }
  updateLnStats();

  const ratingBtns = document.getElementById('lnRatingBtns');
  const ratingHint = document.getElementById('lnRatingHint');
  if (ratingBtns) ratingBtns.classList.add('visible');
  if (ratingHint) ratingHint.classList.add('visible');

  if (isCorrect) {
    setTimeout(() => {
      // Auto-advance: treat as Good (weight=2) if user didn't manually rate
      if (!lnRated) {
        saveWeight('audio', w.n, 2);
        lnRated = true;
        lnIndex++;
        updateLnStats();
        renderListenCard();
      }
    }, 900);
  } else {
    const nextWrap = document.getElementById('lnNextWrap');
    if (nextWrap) nextWrap.style.display = 'block';
  }
}

function rateListenCard(rating) {
  if (!lnChecked || lnRated) return;
  const w = lnQueue[lnIndex];
  lnRated = true;
  saveWeight('audio', w.n, 4 - rating);

  if (rating === 0) {
    const insertAt = Math.min(lnIndex + 5, lnQueue.length);
    lnQueue.splice(insertAt, 0, w);
  }

  lnIndex++;
  updateLnStats();
  renderListenCard();
}

function nextListenCard() {
  if (!lnChecked || lnRated) return;
  const w = lnQueue[lnIndex];
  lnRated = true;
  saveWeight('audio', w.n, 4);
  const insertAt = Math.min(lnIndex + 5, lnQueue.length);
  lnQueue.splice(insertAt, 0, w);
  lnIndex++;
  updateLnStats();
  renderListenCard();
}

/* ── Match Mode (Pairs Memory Game) ── */
let mtTiles = [];         // [{id, wordN, side:'char'|'viet', state:'down'|'up'|'matched'}]
let mtFirstIdx = null;    // tile index of first flipped card this turn
let mtLocked = false;     // when waiting during non-match reveal
let mtMoves = 0;
let mtMatchedCount = 0;

function combinedWordWeight(wordN) {
  // Max weight across all rating-keyed tabs — prioritize weakest words
  const keys = ['char', 'meaning', 'pinyin', 'choose', 'audio'];
  let max = 2;
  for (const k of keys) {
    const w = loadWeights(k)[String(wordN)];
    if (w !== undefined && w > max) max = w;
  }
  return max;
}

function startMatchSession() {
  const lesson = document.getElementById('mtLessonFilter').value;
  const pool = words.filter(w => !lesson || w.lesson == lesson);
  if (pool.length < 4) {
    document.getElementById('mt-content').innerHTML = `
      <div class="fc-message">
        <h3>Not enough words</h3>
        <p>Need at least 4 words — choose another lesson or "All lessons".</p>
      </div>`;
    return;
  }
  // Sort by combined weight desc (most difficult first), with random jitter for ties
  const ranked = pool.slice().map(w => ({ w, score: combinedWordWeight(w.n) + Math.random() * 0.5 }));
  ranked.sort((a, b) => b.score - a.score);
  const chosen = ranked.slice(0, 4).map(x => x.w);

  // Build 8 tiles: char side + viet side for each word
  const tiles = [];
  chosen.forEach(w => {
    tiles.push({ wordN: w.n, side: 'char', state: 'down' });
    tiles.push({ wordN: w.n, side: 'viet', state: 'down' });
  });
  // Shuffle
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }
  tiles.forEach((t, i) => t.id = i);

  mtTiles = tiles;
  mtFirstIdx = null;
  mtLocked = false;
  mtMoves = 0;
  mtMatchedCount = 0;
  updateMtStats();
  renderMatch();
}

function updateMtStats() {
  document.getElementById('mtMoves').textContent = mtMoves;
  document.getElementById('mtMatched').textContent = mtMatchedCount;
}

function renderMatch() {
  const content = document.getElementById('mt-content');

  if (mtTiles.length === 0) {
    content.innerHTML = `
      <div class="fc-message">
        <h3>No game in progress</h3>
        <p>Select a lesson to start.</p>
      </div>`;
    return;
  }

  if (mtMatchedCount === 4) {
    content.innerHTML = `
      <div class="fc-message">
        <h3>Matched all 4 pairs! 🎉</h3>
        <p>Moves: <strong>${mtMoves}</strong></p>
        <div class="fc-msg-actions">
          <button class="primary" onclick="startMatchSession()">New Set</button>
          <button onclick="switchMode('browse')">Back to Browse</button>
        </div>
      </div>`;
    return;
  }

  const tilesHtml = mtTiles.map((t, i) => {
    const w = words.find(x => x.n === t.wordN);
    if (t.state === 'down') {
      return `<div class="mt-tile face-down" onclick="flipMatchTile(${i})">?</div>`;
    }
    const inner = t.side === 'char'
      ? `<div class="mt-char">${w.char}</div>`
      : `<div class="mt-viet">${w.viet}</div>`;
    const cls = t.state === 'matched' ? 'matched' : 'face-up';
    const onClick = t.state === 'up' ? '' : '';
    return `<div class="mt-tile ${cls}" ${onClick}>${inner}</div>`;
  }).join('');

  content.innerHTML = `<div class="mt-grid">${tilesHtml}</div>`;
}

function flipMatchTile(idx) {
  if (mtLocked) return;
  const tile = mtTiles[idx];
  if (!tile || tile.state !== 'down') return;
  tile.state = 'up';

  if (mtFirstIdx === null) {
    mtFirstIdx = idx;
    renderMatch();
    return;
  }
  if (mtFirstIdx === idx) return;

  // Second card revealed
  mtMoves++;
  const first = mtTiles[mtFirstIdx];
  const second = tile;
  renderMatch();
  updateMtStats();

  if (first.wordN === second.wordN && first.side !== second.side) {
    // Match
    first.state = 'matched';
    second.state = 'matched';
    mtMatchedCount++;
    mtFirstIdx = null;
    const w = words.find(x => x.n === first.wordN);
    if (w) speakZh(w.char);
    updateMtStats();
    renderMatch();
  } else {
    // No match — flip both back after 900ms
    mtLocked = true;
    setTimeout(() => {
      first.state = 'down';
      second.state = 'down';
      mtFirstIdx = null;
      mtLocked = false;
      renderMatch();
    }, 900);
  }
}

/* ── Keyboard Shortcuts ── */
document.addEventListener('keydown', (e) => {
  if (currentMode === 'flashcard') {
    if (e.key === 'Enter' && !fcFlipped) {
      e.preventDefault();
      checkAnswer();
      return;
    }
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (fcFlipped && e.key >= '1' && e.key <= '4') {
      e.preventDefault();
      rateCard(parseInt(e.key) - 1);
    }
  } else if (currentMode === 'writing') {
    if (e.key === 'Enter' && !wrChecked) {
      e.preventDefault();
      checkWriting();
      return;
    }
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (wrChecked && e.key >= '1' && e.key <= '4') {
      e.preventDefault();
      rateWritingCard(parseInt(e.key) - 1);
    }
  } else if (currentMode === 'choose') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (!chChecked && e.key >= '1' && e.key <= '4') {
      e.preventDefault();
      selectChoose(parseInt(e.key) - 1);
    } else if (chChecked && e.key >= '1' && e.key <= '4') {
      e.preventDefault();
      rateChooseCard(parseInt(e.key) - 1);
    }
  } else if (currentMode === 'pinyin') {
    if (e.key === 'Enter' && !pyChecked) {
      e.preventDefault();
      checkPinyin();
      return;
    }
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (pyChecked && e.key >= '1' && e.key <= '4') {
      e.preventDefault();
      ratePinyinCard(parseInt(e.key) - 1);
    }
  } else if (currentMode === 'listen') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      replayListenAudio();
      return;
    }
    if (!lnChecked && e.key >= '1' && e.key <= '4') {
      e.preventDefault();
      selectListen(parseInt(e.key) - 1);
    } else if (lnChecked && !lnRated && e.key >= '1' && e.key <= '4') {
      e.preventDefault();
      rateListenCard(parseInt(e.key) - 1);
    }
  }
});

/* ── Init ── */
render();
</script>
